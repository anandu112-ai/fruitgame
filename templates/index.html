<!DOCTYPE html>
<html>

<head>

<title>Word Puzzle Game</title>

<style>

body{
font-family:Arial;
text-align:center;
background:#f4f4f4;
margin-top:30px;
transition:0.5s;
}

#box{
background:white;
width:60%;
margin:auto;
padding:40px;
border-radius:15px;
box-shadow:0 0 20px rgba(0,0,0,0.2);
}

h1{
font-size:40px;
}

#word{
font-size:40px;
letter-spacing:12px;
margin:25px;
}

button{
padding:12px 18px;
margin:5px;
font-size:18px;
cursor:pointer;
border:none;
border-radius:6px;
background:#3498db;
color:white;
}

button:hover{
background:#2980b9;
}

#keyboard{
margin-top:25px;
}

#next{
display:none;
margin-top:20px;
background:#2ecc71;
}

#score{
font-size:22px;
margin-top:10px;
color:#333;
}

.win{
animation: winflash 0.6s infinite alternate;
}

@keyframes winflash{
0%{background:#2ecc71;}
50%{background:#f1c40f;}
100%{background:#e74c3c;}
}

</style>

</head>

<body>

<div id="box">

<h1>Word Puzzle</h1>
<h3>Guess The Fruit Name 🍏🍎</h3>

<div id="score">Score: 0</div>

<br>

<button onclick="startGame()">Start Game</button>

<p id="word"></p>
<p id="chance"></p>
<p id="result"></p>

<div id="keyboard"></div>

<button id="next" onclick="startGame()">Next Game</button>

</div>

<script>

let score=0

function createKeyboard(){

let keyboard=document.getElementById("keyboard")

keyboard.innerHTML=""

for(let i=65;i<=90;i++){

let letter=String.fromCharCode(i)

let btn=document.createElement("button")

btn.innerText=letter

btn.onclick=function(){
guess(letter)
btn.disabled=true
}

keyboard.appendChild(btn)

}

}

async function startGame(){

document.body.classList.remove("win")

let res=await fetch("/start")
let data=await res.json()

document.getElementById("word").innerText=data.word.join(" ")
document.getElementById("chance").innerText="Chance: "+data.chance
document.getElementById("result").innerText=""

document.getElementById("next").style.display="none"

createKeyboard()

}

async function guess(letter){

let res=await fetch("/guess?letter="+letter)

let data=await res.json()

document.getElementById("word").innerText=data.word.join(" ")
document.getElementById("chance").innerText="Chance: "+data.chance

if(data.status=="won"){

score++

document.getElementById("score").innerText="Score: "+score

document.getElementById("result").innerText="🎉 You Won! Word: "+data.answer

document.body.classList.add("win")

confetti()

document.getElementById("next").style.display="inline-block"

}

if(data.status=="lost"){

document.getElementById("result").innerText="💀 Game Over! Word: "+data.answer

document.getElementById("next").style.display="inline-block"

}

}

function confetti(){

for(let i=0;i<80;i++){

let conf=document.createElement("div")

conf.style.position="fixed"
conf.style.width="8px"
conf.style.height="8px"
conf.style.backgroundColor="hsl("+Math.random()*360+",100%,50%)"
conf.style.left=Math.random()*100+"%"
conf.style.top="-10px"
conf.style.opacity="0.8"
conf.style.zIndex="999"

document.body.appendChild(conf)

let fall=setInterval(()=>{

conf.style.top=parseInt(conf.style.top)+5+"px"

if(parseInt(conf.style.top)>window.innerHeight){

conf.remove()
clearInterval(fall)

}

},20)

}

}

</script>

</body>
</html>
