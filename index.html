<!DOCTYPE html>
<html>

<head>
<title>Word Puzzle</title>

<style>
body{
font-family:Arial;
text-align:center;
background:#f4f4f4;
margin-top:30px;
}

#box{
background:white;
width:60%;
margin:auto;
padding:40px;
border-radius:15px;
box-shadow:0 0 20px rgba(0,0,0,0.2);
}

#word{
font-size:40px;
letter-spacing:12px;
margin:20px;
}

button{
padding:10px;
margin:4px;
font-size:16px;
cursor:pointer;
}

.win{
animation: flash 0.5s infinite alternate;
}

@keyframes flash{
0%{background:#2ecc71;}
50%{background:#f1c40f;}
100%{background:#e74c3c;}
}

</style>

</head>

<body>

<div id="box">

<h1>Word Puzzle</h1>
<h3>Guess The Fruit 🍏</h3>

<button onclick="startGame()">Start Game</button>

<p id="word"></p>
<p id="chance"></p>
<p id="result"></p>

<div id="keyboard"></div>

</div>

<script>

let secret_word=""
let display=[]
let chance=5

function createKeyboard(){

let k=document.getElementById("keyboard")
k.innerHTML=""

for(let i=65;i<=90;i++){

let letter=String.fromCharCode(i)

let btn=document.createElement("button")
btn.innerText=letter

btn.onclick=function(){
guess(letter)
btn.disabled=true
}

k.appendChild(btn)

}
}

async function startGame(){

document.body.classList.remove("win")

let res=await fetch("/start")
let data=await res.json()

secret_word=data.word.toLowerCase()
display=Array(secret_word.length).fill("_")
chance=5

updateUI()
createKeyboard()

document.getElementById("result").innerText=""
}

function guess(letter){

letter=letter.toLowerCase()

let correct=false

for(let i=0;i<secret_word.length;i++){
if(secret_word[i]==letter){
display[i]=letter
correct=true
}
}

if(!correct){
chance--
}

updateUI()

if(!display.includes("_")){
document.getElementById("result").innerText="🎉 You Won! Word: "+secret_word
document.body.classList.add("win")
}

if(chance<=0){
document.getElementById("result").innerText="💀 Game Over! Word: "+secret_word
}
}

function updateUI(){
document.getElementById("word").innerText=display.join(" ")
document.getElementById("chance").innerText="Chance: "+chance
}

</script>

</body>
</html>
