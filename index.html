<!DOCTYPE html>
<html>

<head>
<title>Word Puzzle Game</title>

<style>

body{
font-family:Arial;
text-align:center;
background:#f4f4f4;
margin-top:30px;
transition:0.5s;
}

#box{
background:white;
width:60%;
margin:auto;
padding:40px;
border-radius:15px;
box-shadow:0 0 20px rgba(0,0,0,0.2);
}

#word{
font-size:40px;
letter-spacing:12px;
margin:25px;
}

button{
padding:12px 18px;
margin:5px;
font-size:18px;
cursor:pointer;
border:none;
border-radius:6px;
background:#3498db;
color:white;
}

#keyboard{
margin-top:25px;
}

.win{
animation: winflash 0.6s infinite alternate;
}

@keyframes winflash{
0%{background:#2ecc71;}
50%{background:#f1c40f;}
100%{background:#e74c3c;}
}

</style>
</head>

<body>

<div id="box">

<h1>Word Puzzle</h1>
<h3>Guess The Fruit Name 🍏🍎</h3>

<p id="word"></p>
<p id="chance"></p>
<p id="result"></p>

<button onclick="startGame()">Start Game</button>

<div id="keyboard"></div>

</div>

<script>

let word = ""
let display = []
let chance = 5

function createKeyboard(){

let keyboard=document.getElementById("keyboard")
keyboard.innerHTML=""

for(let i=65;i<=90;i++){

let letter=String.fromCharCode(i)

let btn=document.createElement("button")
btn.innerText=letter

btn.onclick=function(){
guess(letter)
btn.disabled=true
}

keyboard.appendChild(btn)

}
}

async function startGame(){

document.body.classList.remove("win")

let res=await fetch("/start")
let data=await res.json()

word = data.word.toLowerCase()
display = Array(word.length).fill("_")
chance = 5

updateUI()

document.getElementById("result").innerText=""

createKeyboard()
}

function guess(letter){

letter = letter.toLowerCase()

let correct = false

for(let i=0;i<word.length;i++){
if(word[i]===letter){
display[i]=letter
correct = true
}
}

if(!correct){
chance--
}

updateUI()

if(!display.includes("_")){
document.getElementById("result").innerText="🎉 You Won! Word: "+word
document.body.classList.add("win")
}

if(chance<=0){
document.getElementById("result").innerText="💀 Game Over! Word: "+word
}
}

function updateUI(){
document.getElementById("word").innerText = display.join(" ")
document.getElementById("chance").innerText = "Chance: "+chance
}

</script>

</body>
</html>
